<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Os Meus Cursos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.469.0/dist/umd/lucide-react.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Heart, Gamepad2, Sparkles, ArrowRight, Clock, BookOpen, Pencil, Layers, Palette } = LucideReact;

// ==========================================
// DADOS DOS CURSOS
// ==========================================

const CURSOS = [
  {
    id: "pixel-art",
    titulo: "Pixel Arte",
    subtitulo: "Do zero ao Fakemon",
    descricao: "Aprende os fundamentos da pixel art, animação, criação de monstros e o estilo Ken Sugimori para criar os teus próprios Fakemons.",
    icone: Gamepad2,
    gradiente: "from-pink-500 via-purple-500 to-indigo-500",
    bgCard: "bg-gradient-to-br from-pink-50 to-purple-50",
    borderCor: "border-purple-200",
    btnCor: "bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700",
    link: "pixel-art.html",
    disponivel: true,
    modulos: 5,
    videos: 19,
    etiqueta: "Disponível"
  },
  {
    id: "arte-digital",
    titulo: "Arte Digital",
    subtitulo: "Cenários, efeitos e portfólio",
    descricao: "Aprende a criar cenários, tiles, efeitos especiais e projetos completos de arte digital — do conceito ao portfólio profissional.",
    icone: Palette,
    gradiente: "from-cyan-500 via-blue-500 to-violet-500",
    bgCard: "bg-gradient-to-br from-cyan-50 to-blue-50",
    borderCor: "border-blue-200",
    btnCor: "bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700",
    link: "arte-digital.html",
    disponivel: true,
    modulos: 3,
    videos: 24,
    etiqueta: "Disponível"
  },
  {
    id: "anatomia",
    titulo: "Anatomia",
    subtitulo: "Estrutura e proporção",
    descricao: "Domina as bases da anatomia humana e animal para dar vida aos teus personagens — proporções, musculatura, poses e muito mais.",
    icone: Pencil,
    gradiente: "from-emerald-500 via-teal-500 to-cyan-500",
    bgCard: "bg-gradient-to-br from-emerald-50 to-teal-50",
    borderCor: "border-teal-200",
    btnCor: "bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700",
    link: "#",
    disponivel: false,
    modulos: null,
    videos: null,
    etiqueta: "Em breve"
  },
  {
    id: "perspectiva",
    titulo: "Perspectiva",
    subtitulo: "Profundidade e espaço",
    descricao: "Aprende a construir cenários e mundos com perspectiva a 1, 2 e 3 pontos, isometria e técnicas de composição visual.",
    icone: Layers,
    gradiente: "from-amber-500 via-orange-500 to-red-500",
    bgCard: "bg-gradient-to-br from-amber-50 to-orange-50",
    borderCor: "border-orange-200",
    btnCor: "bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700",
    link: "#",
    disponivel: false,
    modulos: null,
    videos: null,
    etiqueta: "Em breve"
  }
];

// ==========================================
// COMPONENTES
// ==========================================

const CursoCard = ({ curso }) => {
  const Icone = curso.icone;
  return (
    <div className={`rounded-3xl border-2 ${curso.borderCor} ${curso.bgCard} shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden flex flex-col group`}>
      {/* Cabeçalho colorido */}
      <div className={`bg-gradient-to-r ${curso.gradiente} p-8 text-white relative overflow-hidden`}>
        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#fff 1.5px, transparent 1.5px)', backgroundSize: '16px 16px' }}></div>
        <div className="relative z-10 flex items-center justify-between">
          <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm border border-white/30 shadow-lg">
            <Icone size={40} className="text-white drop-shadow" />
          </div>
          <span className={`text-sm font-bold px-3 py-1 rounded-full backdrop-blur-sm border border-white/30 shadow ${curso.disponivel ? 'bg-white/20 text-white' : 'bg-black/20 text-white/80'}`}>
            {curso.etiqueta}
          </span>
        </div>
        <h3 className="mt-5 text-4xl font-pixel tracking-wider drop-shadow">{curso.titulo}</h3>
        <p className="text-white/80 font-semibold mt-1">{curso.subtitulo}</p>
      </div>

      {/* Corpo do card */}
      <div className="p-6 flex flex-col flex-grow">
        <p className="text-slate-600 leading-relaxed flex-grow">{curso.descricao}</p>

        {/* Metadados */}
        {curso.disponivel && (
          <div className="mt-4 flex items-center space-x-4 text-sm text-slate-500">
            <div className="flex items-center space-x-1">
              <BookOpen size={14} />
              <span><strong>{curso.modulos}</strong> módulos</span>
            </div>
            <div className="flex items-center space-x-1">
              <Clock size={14} />
              <span><strong>{curso.videos}</strong> vídeos</span>
            </div>
          </div>
        )}

        {/* Botão */}
        <div className="mt-6">
          {curso.disponivel ? (
            <a
              href={curso.link}
              className={`flex items-center justify-center space-x-2 w-full py-3 rounded-xl text-white font-bold transition-all duration-200 shadow-md hover:shadow-lg ${curso.btnCor}`}
            >
              <span>Começar Agora</span>
              <ArrowRight size={18} />
            </a>
          ) : (
            <div className="flex items-center justify-center space-x-2 w-full py-3 rounded-xl bg-slate-100 text-slate-400 font-bold border border-slate-200 cursor-not-allowed">
              <Clock size={18} />
              <span>Em breve...</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

function App() {
  return (
    <div className="min-h-screen bg-pink-50 text-slate-800 font-sans selection:bg-pink-300 selection:text-pink-900 pb-16">
      <style>
        {`
          @import url('https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;600;700&display=swap');
          .font-pixel { font-family: 'VT323', monospace; }
          .font-sans { font-family: 'Nunito', sans-serif; }

          ::-webkit-scrollbar { width: 8px; }
          ::-webkit-scrollbar-track { background: #fdf2f8; }
          ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 4px; }
          ::-webkit-scrollbar-thumb:hover { background: #db2777; }
        `}
      </style>

      {/* Hero */}
      <header className="bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white pt-16 pb-28 px-6 shadow-lg relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#fff 2px, transparent 2px)', backgroundSize: '20px 20px' }}></div>

        <div className="max-w-3xl mx-auto text-center space-y-6 relative z-10">
          <div className="flex justify-center items-center space-x-4 animate-bounce">
            <Heart size={36} className="text-pink-200 fill-current" />
            <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm border border-white/30 shadow-xl">
              <Sparkles size={52} className="text-white drop-shadow-md" />
            </div>
            <Heart size={36} className="text-pink-200 fill-current" />
          </div>

          <h1 className="text-5xl md:text-7xl font-pixel tracking-wider drop-shadow-lg text-white">
            Os Meus Cursos
          </h1>
          <h2 className="text-2xl md:text-3xl font-pixel text-pink-100 drop-shadow-md bg-black/20 inline-block px-6 py-2 rounded-full">
            Para o meu Mozinho ❤️
          </h2>
          <p className="text-white/80 text-lg font-medium max-w-xl mx-auto">
            Escolhe o teu curso e começa a aprender ao teu próprio ritmo. Vai do zero ao incrível!
          </p>
        </div>
      </header>

      {/* Grelha de Cursos */}
      <main className="max-w-5xl mx-auto px-4 sm:px-6 mt-[-5rem] relative z-20">
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {CURSOS.map(curso => (
            <CursoCard key={curso.id} curso={curso} />
          ))}
        </div>
      </main>

      <footer className="mt-16 text-center text-slate-500">
        <p className="font-pixel text-xl flex justify-center items-center space-x-2">
          <span>Desenvolvido com</span>
          <Heart size={20} className="text-pink-500 fill-current animate-pulse" />
          <span>para ti</span>
        </p>
      </footer>
    </div>
  );
}

    const rootElement = document.getElementById('root');
    if (rootElement) {
      ReactDOM.createRoot(rootElement).render(<App />);
    }
  </script>
</body>
</html>
