<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curso de Pixel Arte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.469.0/dist/umd/lucide-react.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Heart, Gamepad2, BookOpen, Sparkles, PlayCircle, MonitorPlay, Palette, Ghost, Zap, ChevronDown, ChevronUp, CheckCircle2, Circle, Sword, ArrowLeft } = LucideReact;

// ==========================================
// DADOS DO CURSO
// ==========================================

const MENSAGEM_INICIAL = `Olá, mozinho! ❤️\n\nPreparei este cantinho especial baseado no plano de estudos que organizamos. A pixel art pode parecer intimidadora, cheia de "jaggies", "doubles" e limites de cores, mas a ideia aqui é ir do micro ao macro. Separei o conteúdo em módulos para você não se perder, focando nas ferramentas, na anatomia e até na criação dos seus próprios Fakemons.\n\nVai no seu ritmo, amo você!`;

const MODULOS = [
  {
    id: 1,
    titulo: "Fundamentos & Ferramentas",
    icone: MonitorPlay,
    cor: "text-blue-500",
    bgCor: "bg-blue-100",
    borderCor: "border-blue-400",
    resumo: "Aclimatação ao ambiente de software. O padrão de ouro é o Aseprite. O foco inicial é trabalhar com restrições claustrofóbicas (16x16 ou 32x32) para focar na silhueta e abandonar detalhes irrelevantes.",
    videos: [
      { id: "fkqUErsXRpg", titulo: "Guia Completo: Aseprite", autor: "Capitão Dinossauro" },
      { id: "rVI8lotVTn4", titulo: "O melhor programa: Aseprite", autor: "Papo de Player" },
      { id: "qh0nF7Agm4s", titulo: "Curso Completo para Iniciantes", autor: "Renan Silva - Criação de Jogos" },
      { id: "LYJrPxGsw2s", titulo: "Aprenda Pixel Art do Zero (Série)", autor: "NextIndie Studio" }
    ]
  },
  {
    id: 2,
    titulo: "Sintaxe Visual, Linhas e Cores",
    icone: Palette,
    cor: "text-emerald-500",
    bgCor: "bg-emerald-100",
    borderCor: "border-emerald-400",
    resumo: "Compreensão da geometria do pixel. Eliminação de Doubles (cantos duplos) e engenharia dos Jaggies (serrilhados). Além disso, a aplicação essencial do Hue Shifting (Deslocamento de Matiz) e controle de Dithering.",
    videos: [
      { id: "OhXDQ_4rBRY", titulo: "Guia Completo: Ficheiros e Guardar", autor: "Capitão Dinossauro" },
      { id: "CX-6OOLlxTQ", titulo: "Guia Completo: Cores e Paletas", autor: "Capitão Dinossauro" },
      { id: "nggRYRrdGQ0", titulo: "Guia Completo: Ferramentas de Desenho", autor: "Capitão Dinossauro" },
      { id: "ICAzQprXHYE", titulo: "Guia Completo: Criação de Sprites", autor: "Capitão Dinossauro" },
      { id: "kdOYj4kPsV0", titulo: "Guia Completo: Animação no Aseprite", autor: "Capitão Dinossauro" },
      { id: "tko2S1BjBjU", titulo: "Dominar a Pixel Art - Conceitos", autor: "Papo de Player" }
    ]
  },
  {
    id: 3,
    titulo: "Animação & Princípios Físicos",
    icone: Zap,
    cor: "text-amber-500",
    bgCor: "bg-amber-100",
    borderCor: "border-amber-400",
    resumo: "Os 12 princípios adaptados à baixa resolução. Criação de Ciclos Ociosos (Idle), Caminhada (Walk/Run), o uso da Manobra de Borrão (Smear Frames) para combates e Antecipação de movimento.",
    videos: [
      { id: "UpR6dznvhSI", titulo: "Inserir e Animar Sprites", autor: "Papo de Player" },
      { id: "u2r-xVrM4xw", titulo: "Fundamentos para Jogos", autor: "Papo de Player" }
    ]
  },
  {
    id: 4,
    titulo: "Criação de Personagens, Monstros e Criaturas",
    icone: Sword,
    cor: "text-rose-500",
    bgCor: "bg-rose-100",
    borderCor: "border-rose-400",
    resumo: "Design criativo de criaturas e monstros. Aprenda a quebrar as regras da anatomia humana, combinar membros de animais e construir seres sobrenaturais e assustadores com técnicas progressivas de pixel art.",
    videos: [
      { id: "rKm2meA1Xnw", titulo: "Como Desenhar Monstros e Criaturas", autor: "Desenhando com Mack" },
      { id: "DtG0iLTbJ8M", titulo: "Como Fazer um Monstrão em Pixel Art", autor: "lLoboAzull" },
      { id: "E1XYnWuKo3Y", titulo: "Dicas Rápidas de Anatomia de Monstros", autor: "Shorts Tutorial" }
    ]
  },
  {
    id: 5,
    titulo: "Ecossistema Fakemon & Estilo Pokémon",
    icone: Ghost,
    cor: "text-purple-500",
    bgCor: "bg-purple-100",
    borderCor: "border-purple-400",
    resumo: "O ápice da prática. A emulação do estilo Ken Sugimori (Pokémon), abstração orgânica, regra do pixel duplo, e a controversa porém útil técnica de Splicing (montagem Frankenstein).",
    videos: [
      { id: "WQ9cTeZV8mg", titulo: "Os 4 Passos da Artwork Sugimori", autor: "Kosta Artist" },
      { id: "Se8Aa082Jz4", titulo: "Como Criar Fakemon! Traço e Estilo", autor: "A Toca do Texugo" },
      { id: "ozPvQlrAH0s", titulo: "Como Criar Fakemon! Luz e Sombra", autor: "A Toca do Texugo" },
      { id: "K2gkif7cXyo", titulo: "Pixel Art do Bulbasaur + Criação de Pincel", autor: "Tutorial Procreate" }
    ]
  }
];

// ==========================================
// COMPONENTES
// ==========================================

const VideoCard = ({ video, concluido, onToggle }) => (
  <div className={`bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 border-2 flex flex-col group relative ${concluido ? 'border-green-400 opacity-90' : 'border-slate-200'}`}>
    
    {/* Player de Vídeo com correção ReferrerPolicy */}
    <div className={`relative w-full pt-[56.25%] bg-slate-900 border-b-2 ${concluido ? 'border-green-400' : 'border-pink-200'}`}>
      <iframe
        className="absolute top-0 left-0 w-full h-full"
        src={`https://www.youtube.com/embed/${video.id}?rel=0`}
        title={video.titulo}
        referrerPolicy="strict-origin-when-cross-origin"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowFullScreen
      ></iframe>
    </div>

    {/* Informações do Vídeo & Checklist */}
    <div className="p-4 flex-grow flex flex-col justify-between bg-white z-0">
      <div>
        <h4 className="font-bold text-slate-800 leading-snug group-hover:text-pink-600 transition-colors">
          {video.titulo}
        </h4>
        <div className="flex items-center space-x-2 mt-2 text-sm text-slate-500">
          <PlayCircle size={14} className="text-pink-400" />
          <span className="font-medium">{video.autor}</span>
        </div>
      </div>

      {/* Botão de Checklist */}
      <button 
        onClick={() => onToggle(video.id)}
        className={`mt-4 flex items-center justify-center space-x-2 w-full py-2.5 rounded-lg transition-colors text-sm font-bold ${
          concluido 
            ? 'bg-green-100 text-green-700 hover:bg-green-200 border border-green-300' 
            : 'bg-slate-50 text-slate-600 hover:bg-pink-50 hover:text-pink-600 border border-slate-200 hover:border-pink-200'
        }`}
      >
        {concluido ? <CheckCircle2 size={18} /> : <Circle size={18} />}
        <span>{concluido ? 'Aula Concluída' : 'Marcar como assistida'}</span>
      </button>
    </div>
  </div>
);

const ModuloSection = ({ modulo, aulasVistas, onToggleVideo }) => {
  const [expandido, setExpandido] = useState(true);
  const Icone = modulo.icone;
  
  const totalModulo = modulo.videos.length;
  const concluidosModulo = modulo.videos.filter(v => aulasVistas.includes(v.id)).length;

  return (
    <div className={`mb-8 bg-white rounded-2xl border-2 ${modulo.borderCor} shadow-sm overflow-hidden`}>
      <div 
        className={`p-5 flex items-center justify-between cursor-pointer ${modulo.bgCor} hover:opacity-90 transition-opacity`}
        onClick={() => setExpandido(!expandido)}
      >
        <div className="flex items-center space-x-4">
          <div className={`p-3 bg-white rounded-xl shadow-sm ${modulo.cor}`}>
            <Icone size={24} />
          </div>
          <div>
            <h3 className="text-2xl font-bold text-slate-800">
              {modulo.titulo}
            </h3>
            <p className="text-sm font-semibold text-slate-600 opacity-80 mt-1">
              Progresso: {concluidosModulo}/{totalModulo} aulas
            </p>
          </div>
        </div>
        <button className="text-slate-600 p-2 hover:bg-white/50 rounded-full transition-colors">
          {expandido ? <ChevronUp size={24} /> : <ChevronDown size={24} />}
        </button>
      </div>

      {expandido && (
        <div className="p-6 bg-white animate-in slide-in-from-top-2 duration-300">
          <div className="mb-6 flex space-x-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
            <BookOpen size={20} className="text-slate-400 shrink-0 mt-1" />
            <p className="text-slate-600 leading-relaxed text-sm md:text-base">
              <strong>Foco Pedagógico:</strong> {modulo.resumo}
            </p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {modulo.videos.map((video) => (
              <VideoCard 
                key={video.id} 
                video={video} 
                concluido={aulasVistas.includes(video.id)}
                onToggle={onToggleVideo}
              />
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

function App() {
  const [aulasVistas, setAulasVistas] = useState(() => {
    try {
      const saved = localStorage.getItem('pixelArtMozinhoProgress');
      return saved ? JSON.parse(saved) : [];
    } catch (e) {
      return [];
    }
  });

  useEffect(() => {
    localStorage.setItem('pixelArtMozinhoProgress', JSON.stringify(aulasVistas));
  }, [aulasVistas]);

  const toggleVideo = (videoId) => {
    setAulasVistas(prev => 
      prev.includes(videoId) 
        ? prev.filter(id => id !== videoId) 
        : [...prev, videoId]
    );
  };

  const totalVideos = MODULOS.reduce((acc, modulo) => acc + modulo.videos.length, 0);
  const progressoPercentual = Math.round((aulasVistas.length / totalVideos) * 100) || 0;

  return (
    <div className="min-h-screen bg-pink-50 text-slate-800 font-sans selection:bg-pink-300 selection:text-pink-900 pb-12">
      <style>
        {`
          @import url('https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;600;700&display=swap');
          .font-pixel { font-family: 'VT323', monospace; }
          .font-sans { font-family: 'Nunito', sans-serif; }
          
          ::-webkit-scrollbar { width: 8px; }
          ::-webkit-scrollbar-track { background: #fdf2f8; }
          ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 4px; }
          ::-webkit-scrollbar-thumb:hover { background: #db2777; }
        `}
      </style>

      <header className="bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white pt-16 pb-24 px-6 shadow-lg relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#fff 2px, transparent 2px)', backgroundSize: '20px 20px' }}></div>
        
        <div className="max-w-4xl mx-auto text-center space-y-6 relative z-10">
          <a href="index.html" className="inline-flex items-center space-x-2 text-white/80 hover:text-white transition-colors text-sm font-semibold bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm border border-white/20 mb-4">
            <ArrowLeft size={16} />
            <span>Voltar aos Cursos</span>
          </a>

          <div className="flex justify-center items-center space-x-4 animate-bounce">
            <Heart size={36} className="text-pink-200 fill-current" />
            <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm border border-white/30 shadow-xl">
               <Gamepad2 size={56} className="text-white drop-shadow-md" />
            </div>
            <Heart size={36} className="text-pink-200 fill-current" />
          </div>
          
          <h1 className="text-5xl md:text-7xl font-pixel tracking-wider drop-shadow-lg text-white">
            Curso de Pixel Arte
          </h1>
          <h2 className="text-2xl md:text-3xl font-pixel text-pink-100 drop-shadow-md bg-black/20 inline-block px-6 py-2 rounded-full">
            Para o meu Mozinho
          </h2>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 sm:px-6 space-y-8 mt-[-4rem] relative z-20">
        
        <section className="bg-white rounded-3xl p-8 shadow-xl border-4 border-pink-100 flex flex-col md:flex-row gap-6 items-center">
          <div className="bg-pink-100 p-6 rounded-full shrink-0 animate-pulse">
            <Sparkles className="text-pink-500" size={48} />
          </div>
          <div className="prose prose-lg text-slate-700 leading-relaxed whitespace-pre-wrap font-medium w-full">
            {MENSAGEM_INICIAL}
            
            {/* Barra de Progresso Global */}
            <div className="mt-6 pt-6 border-t border-slate-100">
              <div className="flex justify-between items-end mb-2">
                <span className="text-sm font-bold text-slate-500 uppercase tracking-wider">O seu Progresso</span>
                <span className="text-2xl font-pixel text-pink-500">{progressoPercentual}%</span>
              </div>
              <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden border border-slate-200 shadow-inner">
                <div 
                  className="bg-gradient-to-r from-pink-400 to-purple-500 h-4 rounded-full transition-all duration-700 ease-out"
                  style={{ width: `${progressoPercentual}%` }}
                ></div>
              </div>
            </div>
          </div>
        </section>

        <section className="pt-8">
          <div className="flex items-center justify-center space-x-3 mb-10">
            <div className="h-1 w-12 bg-purple-300 rounded-full"></div>
            <h2 className="text-4xl font-pixel text-purple-600 text-center uppercase tracking-widest">
              Trilha de Estudos
            </h2>
            <div className="h-1 w-12 bg-purple-300 rounded-full"></div>
          </div>

          <div className="space-y-6">
            {MODULOS.map(modulo => (
              <ModuloSection 
                key={modulo.id} 
                modulo={modulo} 
                aulasVistas={aulasVistas}
                onToggleVideo={toggleVideo}
              />
            ))}
          </div>
        </section>
      </main>

      <footer className="mt-16 text-center text-slate-500">
        <p className="font-pixel text-xl flex justify-center items-center space-x-2">
          <span>Desenvolvido com</span>
          <Heart size={20} className="text-pink-500 fill-current animate-pulse" />
          <span>para você</span>
        </p>
      </footer>
    </div>
  );
}

    const rootElement = document.getElementById('root');
    if (rootElement) {
      ReactDOM.createRoot(rootElement).render(<App />);
    }
  </script>
</body>
</html>
