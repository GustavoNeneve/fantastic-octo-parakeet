<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curso de Arte Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.469.0/dist/umd/lucide-react.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Heart, Palette, BookOpen, Sparkles, PlayCircle, Layers, ChevronDown, ChevronUp, CheckCircle2, Circle, ArrowLeft } = LucideReact;

// ==========================================
// DADOS DO CURSO
// ==========================================

const MENSAGEM_INICIAL = `Olá, mozinho! ❤️\n\nPreparei este cantinho de arte digital para ti! Aqui vais encontrar tudo sobre criação de cenários, efeitos especiais e projetos completos — não só pixel art, mas arte digital em geral.\n\nCada módulo tem um foco diferente, para ires evoluindo passo a passo. Vai ao teu ritmo, amo-te!`;

const MODULOS = [
  {
    id: 1,
    titulo: "Cenários, Tiles e Level Design",
    icone: Layers,
    cor: "text-sky-500",
    bgCor: "bg-sky-100",
    borderCor: "border-sky-400",
    resumo: "Construção de mapas e cenários em arte digital. Criação de tilesets, plataformas, fundos (backgrounds) e ambientes para jogos 2D. Aprende a combinar tiles e criar profundidade visual nos teus mundos.",
    videos: [
      { id: "bhjJpVAB-Qs", titulo: "Como Criar Cenários em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "ntXC1YuOjP4", titulo: "Tilesets e Mapas para Jogos 2D", autor: "Tutorial Arte Digital" },
      { id: "P2AOHOb0964", titulo: "Fundos e Backgrounds em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "onelgVKvRhw", titulo: "Level Design em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "sLASEABo984", titulo: "Perspectiva e Profundidade em Cenários", autor: "Tutorial Arte Digital" },
      { id: "CcnlahZNcUw", titulo: "Ambientes e Natureza em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "PoyxLR7Dnow", titulo: "Criação de Tiles Reutilizáveis", autor: "Tutorial Arte Digital" },
      { id: "HQNEZz222JQ", titulo: "Técnicas de Composição Visual", autor: "Tutorial Arte Digital" }
    ]
  },
  {
    id: 2,
    titulo: "Efeitos Especiais e Partículas",
    icone: Sparkles,
    cor: "text-yellow-500",
    bgCor: "bg-yellow-100",
    borderCor: "border-yellow-400",
    resumo: "Criação de efeitos visuais em arte digital: explosões, fogo, água, magia, fumo e partículas. Técnicas de animação de efeitos especiais para tornar os teus projetos mais dinâmicos e expressivos.",
    videos: [
      { id: "oqWF0R_ytg4", titulo: "Efeitos de Fogo e Chamas", autor: "Tutorial Arte Digital" },
      { id: "tEMpR_6poUg", titulo: "Explosões e Impactos em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "Ndd7BYu3E9k", titulo: "Efeitos de Água e Líquidos", autor: "Tutorial Arte Digital" },
      { id: "XSjFZl_IQ0s", titulo: "Partículas e Magia em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "Z61coaky1OI", titulo: "Efeitos de Fumo e Névoa", autor: "Tutorial Arte Digital" }
    ]
  },
  {
    id: 3,
    titulo: "Projetos Completos e Portfólio",
    icone: BookOpen,
    cor: "text-lime-600",
    bgCor: "bg-lime-100",
    borderCor: "border-lime-400",
    resumo: "Desenvolvimento de projetos completos do início ao fim. Criação de sprites de personagens, interfaces (UI/HUD), itens e ícones, e montagem de um portfólio profissional de arte digital.",
    videos: [
      { id: "e2pvVRL-Ehw", titulo: "Criação de Sprite de Personagem Completo", autor: "Tutorial Arte Digital" },
      { id: "5Lo9n3Us8U0", titulo: "UI e Interface para Jogos em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "iadFcSz5y8w", titulo: "Ícones e Itens em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "YN7eyUJ-ADU", titulo: "Animação de Personagem Completa", autor: "Tutorial Arte Digital" },
      { id: "RQEuy6Qb0MQ", titulo: "Arte Digital para Plataformas Mobile", autor: "Tutorial Arte Digital" },
      { id: "D7SH4DmZ0PI", titulo: "Projeto de Jogo em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "tWKnKq2Gz9s", titulo: "Técnicas de Shading Avançado", autor: "Tutorial Arte Digital" },
      { id: "gD_kxSYnuhU", titulo: "Criação de Logo em Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "lylQpxkIywQ", titulo: "Portfólio e Publicação de Arte Digital", autor: "Tutorial Arte Digital" },
      { id: "5q779fqPJZo", titulo: "Speed Art: Projeto Completo", autor: "Tutorial Arte Digital" },
      { id: "12Jjl6v93JA", titulo: "Dicas Finais e Próximos Passos", autor: "Tutorial Arte Digital" }
    ]
  }
];

// ==========================================
// COMPONENTES
// ==========================================

const VideoCard = ({ video, concluido, onToggle }) => (
  <div className={`bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 border-2 flex flex-col group relative ${concluido ? 'border-green-400 opacity-90' : 'border-slate-200'}`}>
    
    {/* Player de Vídeo */}
    <div className={`relative w-full pt-[56.25%] bg-slate-900 border-b-2 ${concluido ? 'border-green-400' : 'border-cyan-200'}`}>
      <iframe
        className="absolute top-0 left-0 w-full h-full"
        src={`https://www.youtube.com/embed/${video.id}?rel=0`}
        title={video.titulo}
        referrerPolicy="strict-origin-when-cross-origin"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowFullScreen
      ></iframe>
    </div>

    {/* Informações do Vídeo & Checklist */}
    <div className="p-4 flex-grow flex flex-col justify-between bg-white z-0">
      <div>
        <h4 className="font-bold text-slate-800 leading-snug group-hover:text-cyan-600 transition-colors">
          {video.titulo}
        </h4>
        <div className="flex items-center space-x-2 mt-2 text-sm text-slate-500">
          <PlayCircle size={14} className="text-cyan-400" />
          <span className="font-medium">{video.autor}</span>
        </div>
      </div>

      {/* Botão de Checklist */}
      <button 
        onClick={() => onToggle(video.id)}
        className={`mt-4 flex items-center justify-center space-x-2 w-full py-2.5 rounded-lg transition-colors text-sm font-bold ${
          concluido 
            ? 'bg-green-100 text-green-700 hover:bg-green-200 border border-green-300' 
            : 'bg-slate-50 text-slate-600 hover:bg-cyan-50 hover:text-cyan-600 border border-slate-200 hover:border-cyan-200'
        }`}
      >
        {concluido ? <CheckCircle2 size={18} /> : <Circle size={18} />}
        <span>{concluido ? 'Aula Concluída' : 'Marcar como vista'}</span>
      </button>
    </div>
  </div>
);

const ModuloSection = ({ modulo, aulasVistas, onToggleVideo }) => {
  const [expandido, setExpandido] = useState(true);
  const Icone = modulo.icone;
  
  const totalModulo = modulo.videos.length;
  const concluidosModulo = modulo.videos.filter(v => aulasVistas.includes(v.id)).length;

  return (
    <div className={`mb-8 bg-white rounded-2xl border-2 ${modulo.borderCor} shadow-sm overflow-hidden`}>
      <div 
        className={`p-5 flex items-center justify-between cursor-pointer ${modulo.bgCor} hover:opacity-90 transition-opacity`}
        onClick={() => setExpandido(!expandido)}
      >
        <div className="flex items-center space-x-4">
          <div className={`p-3 bg-white rounded-xl shadow-sm ${modulo.cor}`}>
            <Icone size={24} />
          </div>
          <div>
            <h3 className="text-2xl font-bold text-slate-800">
              {modulo.titulo}
            </h3>
            <p className="text-sm font-semibold text-slate-600 opacity-80 mt-1">
              Progresso: {concluidosModulo}/{totalModulo} aulas
            </p>
          </div>
        </div>
        <button className="text-slate-600 p-2 hover:bg-white/50 rounded-full transition-colors">
          {expandido ? <ChevronUp size={24} /> : <ChevronDown size={24} />}
        </button>
      </div>

      {expandido && (
        <div className="p-6 bg-white animate-in slide-in-from-top-2 duration-300">
          <div className="mb-6 flex space-x-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
            <BookOpen size={20} className="text-slate-400 shrink-0 mt-1" />
            <p className="text-slate-600 leading-relaxed text-sm md:text-base">
              <strong>Foco Pedagógico:</strong> {modulo.resumo}
            </p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {modulo.videos.map((video) => (
              <VideoCard 
                key={video.id} 
                video={video} 
                concluido={aulasVistas.includes(video.id)}
                onToggle={onToggleVideo}
              />
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

function App() {
  const [aulasVistas, setAulasVistas] = useState(() => {
    try {
      const saved = localStorage.getItem('arteDigitalMozinhoProgress');
      return saved ? JSON.parse(saved) : [];
    } catch (e) {
      return [];
    }
  });

  useEffect(() => {
    localStorage.setItem('arteDigitalMozinhoProgress', JSON.stringify(aulasVistas));
  }, [aulasVistas]);

  const toggleVideo = (videoId) => {
    setAulasVistas(prev => 
      prev.includes(videoId) 
        ? prev.filter(id => id !== videoId) 
        : [...prev, videoId]
    );
  };

  const totalVideos = MODULOS.reduce((acc, modulo) => acc + modulo.videos.length, 0);
  const progressoPercentual = Math.round((aulasVistas.length / totalVideos) * 100) || 0;

  return (
    <div className="min-h-screen bg-cyan-50 text-slate-800 font-sans selection:bg-cyan-300 selection:text-cyan-900 pb-12">
      <style>
        {`
          @import url('https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;600;700&display=swap');
          .font-pixel { font-family: 'VT323', monospace; }
          .font-sans { font-family: 'Nunito', sans-serif; }
          
          ::-webkit-scrollbar { width: 8px; }
          ::-webkit-scrollbar-track { background: #ecfeff; }
          ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 4px; }
          ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
        `}
      </style>

      <header className="bg-gradient-to-r from-cyan-500 via-blue-500 to-violet-500 text-white pt-16 pb-24 px-6 shadow-lg relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#fff 2px, transparent 2px)', backgroundSize: '20px 20px' }}></div>
        
        <div className="max-w-4xl mx-auto text-center space-y-6 relative z-10">
          <a href="index.html" className="inline-flex items-center space-x-2 text-white/80 hover:text-white transition-colors text-sm font-semibold bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm border border-white/20 mb-4">
            <ArrowLeft size={16} />
            <span>Voltar aos Cursos</span>
          </a>

          <div className="flex justify-center items-center space-x-4 animate-bounce">
            <Heart size={36} className="text-cyan-200 fill-current" />
            <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm border border-white/30 shadow-xl">
               <Palette size={56} className="text-white drop-shadow-md" />
            </div>
            <Heart size={36} className="text-cyan-200 fill-current" />
          </div>
          
          <h1 className="text-5xl md:text-7xl font-pixel tracking-wider drop-shadow-lg text-white">
            Curso de Arte Digital
          </h1>
          <h2 className="text-2xl md:text-3xl font-pixel text-cyan-100 drop-shadow-md bg-black/20 inline-block px-6 py-2 rounded-full">
            Para o meu Mozinho
          </h2>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 sm:px-6 space-y-8 mt-[-4rem] relative z-20">
        
        <section className="bg-white rounded-3xl p-8 shadow-xl border-4 border-cyan-100 flex flex-col md:flex-row gap-6 items-center">
          <div className="bg-cyan-100 p-6 rounded-full shrink-0 animate-pulse">
            <Sparkles className="text-cyan-500" size={48} />
          </div>
          <div className="prose prose-lg text-slate-700 leading-relaxed whitespace-pre-wrap font-medium w-full">
            {MENSAGEM_INICIAL}
            
            {/* Barra de Progresso Global */}
            <div className="mt-6 pt-6 border-t border-slate-100">
              <div className="flex justify-between items-end mb-2">
                <span className="text-sm font-bold text-slate-500 uppercase tracking-wider">O teu Progresso</span>
                <span className="text-2xl font-pixel text-cyan-500">{progressoPercentual}%</span>
              </div>
              <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden border border-slate-200 shadow-inner">
                <div 
                  className="bg-gradient-to-r from-cyan-400 to-blue-500 h-4 rounded-full transition-all duration-700 ease-out"
                  style={{ width: `${progressoPercentual}%` }}
                ></div>
              </div>
            </div>
          </div>
        </section>

        <section className="pt-8">
          <div className="flex items-center justify-center space-x-3 mb-10">
            <div className="h-1 w-12 bg-blue-300 rounded-full"></div>
            <h2 className="text-4xl font-pixel text-blue-600 text-center uppercase tracking-widest">
              Trilha de Estudos
            </h2>
            <div className="h-1 w-12 bg-blue-300 rounded-full"></div>
          </div>

          <div className="space-y-6">
            {MODULOS.map(modulo => (
              <ModuloSection 
                key={modulo.id} 
                modulo={modulo} 
                aulasVistas={aulasVistas}
                onToggleVideo={toggleVideo}
              />
            ))}
          </div>
        </section>
      </main>

      <footer className="mt-16 text-center text-slate-500">
        <p className="font-pixel text-xl flex justify-center items-center space-x-2">
          <span>Desenvolvido com</span>
          <Heart size={20} className="text-cyan-500 fill-current animate-pulse" />
          <span>para ti</span>
        </p>
      </footer>
    </div>
  );
}

    const rootElement = document.getElementById('root');
    if (rootElement) {
      ReactDOM.createRoot(rootElement).render(<App />);
    }
  </script>
</body>
</html>
